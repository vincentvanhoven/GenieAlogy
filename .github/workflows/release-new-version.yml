name: Release new version

on:
  push:
    tags:
      - 'v*'

jobs:
  build-all:
    runs-on: ${{ matrix.os == 'ubuntu-22.04' && (matrix.arch == 'amd64' && 'ubuntu-22.04' || 'ubuntu-22.04-arm') || matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-22.04, macos-latest, windows-latest ]
        arch: [ amd64, arm64 ]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 1.24.0

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            pkg-config

      - name: Build
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-22.04" ]]; then
            wails build --platform linux/${{ matrix.arch }} -tags webkit2_41
            mv build/bin/GenieAlogy build/bin/GenieAlogy-${{ github.ref_name }}-linux-${{ matrix.arch }}
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            wails build --platform darwin/${{ matrix.arch }}
            mv build/bin/GenieAlogy.app build/bin/GenieAlogy-${{ github.ref_name }}-darwin-${{ matrix.arch }}.app
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            wails build --platform windows/${{ matrix.arch }}
            mv build/bin/GenieAlogy.exe build/bin/GenieAlogy-${{ github.ref_name }}-windows-${{ matrix.arch }}.exe
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geniealogy-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}
          path: build/bin/*

  release:
    runs-on: ubuntu-latest
    needs: build-all
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-binaries

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        run: |
          for f in release-binaries/*; do
            fname=$(basename "$f")
            gh release upload "${{ github.ref_name }}" "$f" --clobber --repo "${{ github.repository }}"
          done
