name: Produce GenieAlogy builds

on:
  workflow_dispatch:
    inputs:
      version:
        description: GenieAlogy version
        required: true

jobs:
  build-all:
    runs-on: ${{ matrix.os == 'ubuntu-22.04' && (matrix.arch == 'amd64' && 'ubuntu-22.04' || 'ubuntu-22.04-arm') || matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.24.0
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libglib2.0-dev \
            pkg-config

      - name: Build Linux
        if: matrix.os == 'ubuntu-22.04'
        run: wails build --platform linux/${{ matrix.arch }} -tags webkit2_41
        shell: bash
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: wails build --platform darwin/${{ matrix.arch }}
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: wails build --platform windows/${{ matrix.arch }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geniealogy-${{ github.event.inputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: build/bin/**/*
