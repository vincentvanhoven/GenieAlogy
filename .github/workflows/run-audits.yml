name: Run audits

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: "Run audits"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Run tests
        run: |
          cd frontend
          npm audit